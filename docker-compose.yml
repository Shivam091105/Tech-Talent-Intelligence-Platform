version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: tech_talent_db
    environment:
      POSTGRES_DB: ${DB_NAME:-tech_talent_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-te31204}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tech_talent_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit Application
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: tech_talent_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-te31204}@db:5432/${DB_NAME:-tech_talent_db}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tech_talent_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-te31204}
      APP_ENV: production
      LOG_LEVEL: INFO
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:8501"
    volumes:
      - ./data/raw:/app/data/raw:ro
    command: >
      streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
